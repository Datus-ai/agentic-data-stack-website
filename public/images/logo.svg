<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g0" x1="0" y1="0" x2="0.8" y2="1" gradientTransform="rotate(0)">
      <stop offset="0%" stop-color="#c084fc"/><stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="0.8" y2="1" gradientTransform="rotate(60)">
      <stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0.8" y2="1" gradientTransform="rotate(120)">
      <stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0.8" y2="1" gradientTransform="rotate(180)">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0.8" y2="1" gradientTransform="rotate(240)">
      <stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="0.8" y2="1" gradientTransform="rotate(300)">
      <stop offset="0%" stop-color="#c084fc"/><stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Subtle background glow -->
  <circle cx="60" cy="60" r="48" fill="url(#glow)"/>

  <g transform="translate(60,60)">
    <!-- 6 swirl blades, each rotated 60° -->
    <path d="M 2,-6 C 9,-14 22,-28 18,-42 C 14,-44 6,-34 1,-20 C -2,-12 0,-6 2,-6Z" fill="url(#g0)"/>
    <path d="M 2,-6 C 9,-14 22,-28 18,-42 C 14,-44 6,-34 1,-20 C -2,-12 0,-6 2,-6Z" fill="url(#g1)" transform="rotate(60)"/>
    <path d="M 2,-6 C 9,-14 22,-28 18,-42 C 14,-44 6,-34 1,-20 C -2,-12 0,-6 2,-6Z" fill="url(#g2)" transform="rotate(120)"/>
    <path d="M 2,-6 C 9,-14 22,-28 18,-42 C 14,-44 6,-34 1,-20 C -2,-12 0,-6 2,-6Z" fill="url(#g3)" transform="rotate(180)"/>
    <path d="M 2,-6 C 9,-14 22,-28 18,-42 C 14,-44 6,-34 1,-20 C -2,-12 0,-6 2,-6Z" fill="url(#g4)" transform="rotate(240)"/>
    <path d="M 2,-6 C 9,-14 22,-28 18,-42 C 14,-44 6,-34 1,-20 C -2,-12 0,-6 2,-6Z" fill="url(#g5)" transform="rotate(300)"/>
  </g>
</svg>
